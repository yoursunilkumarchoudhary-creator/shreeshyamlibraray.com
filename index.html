<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Members</title>
<style>
body {
    font-family: Arial;
    background: #f4f6f9;
}

header {
    background: linear-gradient(to right, #3a7bd5, #3a6073);
    color: white;
    padding: 15px;
    font-size: 24px;
}

.container {
    width: 90%;
    margin: auto;
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, select {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 8px 15px;
    background: #3a7bd5;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #3a7bd5;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

.paid {
    color: green;
    font-weight: bold;
}

.unpaid {
    color: red;
    font-weight: bold;
}

img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
}
</style>
</head>

<body>

<header>📚 Library Members</header>

<div class="container">

<h3>Add Student</h3>

<input type="text" id="name" placeholder="Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="sheet" placeholder="Sheet No.">

<select id="fees">
<option value="Paid">Paid</option>
<option value="Unpaid">Unpaid</option>
</select>

<select id="membership">
<option value="Premium">Premium</option>
<option value="Standard">Standard</option>
</select>

<input type="file" id="photo">

<button onclick="addStudent()">Add</button>

<table>
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Phone</th>
<th>Sheet</th>
<th>Fees</th>
<th>Membership</th>
</tr>
</thead>

<tbody id="tableData"></tbody>

</table>

</div>

<script>
function addStudent() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let sheet = document.getElementById("sheet").value;
    let fees = document.getElementById("fees").value;
    let membership = document.getElementById("membership").value;
    let photoInput = document.getElementById("photo");

    let reader = new FileReader();

    reader.onload = function(e) {
        let table = document.getElementById("tableData");

        let row = `
        <tr>
            <td><img src="${e.target.result}"></td>
            <td>${name}</td>
            <td>${phone}</td>
            <td>${sheet}</td>
            <td class="${fees == 'Paid' ? 'paid' : 'unpaid'}">${fees}</td>
            <td>${membership}</td>
        </tr>
        `;

        table.innerHTML += row;
    };

    if(photoInput.files[0]) {
        reader.readAsDataURL(photoInput.files[0]);
    } else {
        alert("Please upload photo");
    }
}
</script>

</body>
</html>
