<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Admin</h2>
        <ul>
            <li>Dashboard</li>
            <li>Users</li>
            <li>Fees</li>
            <li>Analytics</li>
        </ul>
    </div>

    <div class="main">
        <img src="logo.png" class="logo"/>
        <h1>Admin Dashboard</h1>

        <input type="text" placeholder="Search..." id="searchBox"/>

        <div class="cards">
            <div class="card">Total Users: 120</div>
            <div class="card">Fees Collected: $5000</div>
            <div class="card">Pending Fees: $1200</div>
        </div>

        <h2>Add User</h2>
        <form>
            <input type="text" placeholder="Name" required><br>
            <input type="text" placeholder="Mobile Number" required><br>
            <button type="submit">Add</button>
        </form>
    </div>
</body>
</html>
